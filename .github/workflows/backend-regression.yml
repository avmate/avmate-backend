name: Backend Regression

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  citation-regression:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install CI dependencies
        run: python -m pip install --upgrade pip && pip install -r requirements-ci.txt

      - name: Compile critical modules
        run: python -m py_compile app/services/search_service.py app/services/section_parser.py regression_queries.py

      - name: Run unit regression tests
        run: python -m unittest discover -s tests -p "test_*.py" -v

  live-regression:
    needs: citation-regression
    if: ${{ vars.AVMATE_BASE_URL != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      AVMATE_BASE_URL: ${{ vars.AVMATE_BASE_URL }}
      AVMATE_READY_WAIT_SECONDS: "300"
      AVMATE_CASE_RETRY_ATTEMPTS: "6"
      AVMATE_CASE_RETRY_DELAY_SECONDS: "10"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install script dependencies
        run: python -m pip install --upgrade pip && pip install requests==2.32.5

      - name: Run live Railway regression checks
        run: python regression_queries.py
